# ─────────────────────────────────────────────────────────────────────────
# OXYGPT — Docker Compose deployment
# ─────────────────────────────────────────────────────────────────────────
# Usage:
#   1. cp .env.example .env   # then fill in your credentials
#   2. docker compose up -d --build
#   3. docker compose logs -f
#
# All persistent state (Telegram session files + SQLite databases) is kept in
# the named volume `oxygpt-data`, mounted at /data inside the container. That
# means image rebuilds and container recreation never lose your login session
# or user data.
# ─────────────────────────────────────────────────────────────────────────

services:
  oxygpt:
    build:
      context: .
      dockerfile: Dockerfile
    image: oxygpt:latest
    container_name: oxygpt
    restart: unless-stopped

    # Credentials and configuration come from your local .env file.
    env_file:
      - .env

    # State lives on a named volume so it survives rebuilds.
    volumes:
      - oxygpt-data:/data

    # The bot is long-running; tini (the image ENTRYPOINT) handles signals so
    # `docker compose stop` shuts it down cleanly.
    stop_grace_period: 20s

    # Keep container logs from growing without bound on a long-lived server.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  oxygpt-data:
    name: oxygpt-data
