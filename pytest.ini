[pytest]
# All OXYGPT tests live in the dedicated `tests/` package.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-asyncio: allow bare `async def test_*` without per-test markers.
asyncio_mode = auto

addopts = -ra --strict-markers

filterwarnings =
    ignore::DeprecationWarning
